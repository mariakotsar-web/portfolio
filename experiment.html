<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maria Kotsar — Experiment</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0C0C0C;
    --bg-elevated: #141414;
    --text-primary: #F0F0F0;
    --text-secondary: #A8A29E;
    --text-tertiary: #8A8078;
    --accent: #CBB674;
    --accent-secondary: #9B7DB8;
    --status-green: #4ADE80;
    --border: rgba(245, 240, 235, 0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Navigation */
  .nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 0 80px;
    height: 68px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(12, 12, 12, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .nav-monogram {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-primary);
    text-decoration: none;
    transition: color 0.3s ease;
  }
  .nav-monogram:hover { color: var(--accent); }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
    list-style: none;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }

  .nav-link {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-primary);
    text-decoration: none;
    position: relative;
    transition: color 0.3s ease;
  }
  .nav-link::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    width: 100%;
    height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .nav-link:hover, .nav-link:focus-visible { color: var(--accent); }
  .nav-link:hover::after, .nav-link:focus-visible::after { transform: scaleX(1); }
  .nav-link:focus-visible { outline: none; }

  .nav-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-primary);
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--status-green);
    box-shadow: 0 0 7px rgba(74, 222, 128, 0.37);
    opacity: 0.86;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 0.86; box-shadow: 0 0 7px rgba(74, 222, 128, 0.37); }
    50% { opacity: 0.6; box-shadow: 0 0 7px rgba(74, 222, 128, 0.13); }
  }

  /* Hero */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 80px;
    position: relative;
  }

  .hero-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-tertiary);
    margin-bottom: 32px;
    opacity: 0;
    animation: fade-up 0.6s ease 0.2s forwards;
  }

  .hero-name {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(4.5rem, 12vw, 10rem);
    line-height: 0.92;
    letter-spacing: 0.02em;
    color: var(--text-primary);
  }
  .hero-name .line {
    display: block;
    overflow: hidden;
  }
  .hero-name .line:first-child {
    font-size: 0.45em;
    letter-spacing: 0;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .hero-name .line-inner {
    display: block;
    transform: translateY(110%);
    animation: clip-reveal 1s cubic-bezier(0.77, 0, 0.175, 1) forwards;
  }

  @keyframes clip-reveal {
    to { transform: translateY(0); }
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-subtitle {
    font-size: clamp(1rem, 1.5vw, 1.15rem);
    font-weight: 300;
    color: var(--text-secondary);
    margin-top: 32px;
    max-width: 600px;
    line-height: 1.6;
    opacity: 0;
    animation: fade-up 0.6s ease 0.7s forwards;
  }
  .hero-subtitle em {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    color: var(--accent);
  }

  .hero-draw-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-tertiary);
    margin-top: 40px;
    opacity: 0;
    animation: fade-up 0.6s ease 1.2s forwards;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    transition: color 0.3s ease;
  }
  .hero-draw-hint:hover { color: var(--text-secondary); }

  /* Focus styles */
  a:focus-visible, button:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* Mobile */
  @media (max-width: 768px) {
    .nav { padding: 0 20px; }
    .nav-links { display: none; }
    .nav-status { display: none; }
    .hero { padding: 0 20px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="#" class="nav-monogram" aria-label="Home">MK</a>
  <ul class="nav-links">
    <li><a href="#work" class="nav-link">Work</a></li>
    <li><a href="#about" class="nav-link">About</a></li>
    <li><a href="#contact" class="nav-link">Contact</a></li>
  </ul>
  <div class="nav-status" aria-label="Current availability">
    <span class="status-dot" aria-hidden="true"></span>
    <span id="navTime"></span>
  </div>
</nav>

<section class="hero" id="hero">
  <p class="hero-eyebrow">Product Designer</p>
  <h1 class="hero-name">
    <span class="line"><span class="line-inner">Hello, I'm</span></span>
    <span class="line"><span class="line-inner">Maria</span></span>
  </h1>
  <p class="hero-subtitle">Design Lead at <em>Manulife Financial</em> — I thrive in the messy early stages: ideation, concepting, and design exploration. I lead teams delivering secure, scalable enterprise experiences across insurance &amp; wealth. Based in Toronto.</p>
  <button class="hero-draw-hint" aria-label="Activate drawing mode">[ double-click to sketch ]</button>
</section>

<script>
  function updateTime() {
    const now = new Date();
    const options = { timeZone: 'America/Toronto', hour: '2-digit', minute: '2-digit', hour12: true };
    const timeStr = now.toLocaleTimeString('en-US', options);
    const navTime = document.getElementById('navTime');
    if (navTime) navTime.textContent = timeStr + ' EST';
  }
  updateTime();
  setInterval(updateTime, 30000);
</script>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</body>
</html>
